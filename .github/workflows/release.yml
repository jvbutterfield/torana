name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

# id-token:write is what npm's Trusted Publishing uses to mint a short-lived
# OIDC credential for the publish — no NPM_TOKEN secret in this repo.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Node 22 ships npm 10.x; Trusted Publishing requires npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --timeout 15000

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Build
        run: bun run build

      # No NODE_AUTH_TOKEN here — npm uses OIDC via the id-token:write permission
      # above, authenticated against the Trusted Publisher configured on npmjs.com.
      - name: Publish to npm
        run: npm publish --provenance --access public
