name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  # Manual dry-run exercise: runs every step of the pipeline up to but not
  # including `npm publish`. Lets us verify the build/test/pack path without
  # cutting a real tag and landing in a re-tag cycle to fix a latent bug.
  # See issue #2.
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true
        description: "Skip npm publish (verify pipeline only)"

# id-token:write is what npm's Trusted Publishing uses to mint a short-lived
# OIDC credential for the publish — no NPM_TOKEN secret in this repo.
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Trusted Publishing requires npm >= 11.5.1. Node 24 ships npm 11.x
      # natively; using Node 22 + `npm install -g npm@latest` hits a known
      # MODULE_NOT_FOUND bug where the self-upgrade corrupts the running npm.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Print npm version
        run: npm --version

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --timeout 15000

      # Use `bun audit` instead of `npm audit`: bun is the install path here,
      # so no package-lock.json exists. `bun audit` reads bun.lock and hits the
      # same advisory DB as npm.
      - name: Audit dependencies (high+)
        run: bun audit --audit-level=high

      - name: Build
        run: bun run build

      # Guard against shipping a tarball without the runtime-loaded SQL files
      # (rc.1 regression). Fails the publish before it mints an OIDC token.
      - name: Verify pack manifest
        run: bun run scripts/verify-pack.ts

      # Compute the npm dist-tag: prerelease versions (anything with a `-`
      # after the version) publish under `rc` so they don't take the `latest`
      # pointer from a stable release. Stable versions publish as `latest`.
      - name: Compute dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Publishing $VERSION under dist-tag: $(grep dist_tag $GITHUB_OUTPUT)"

      # workflow_dispatch dry-run: produce the tarball as a build artifact so
      # a maintainer can inspect it (or feed it to a smoke install) without
      # publishing. Only uploads on manual dispatch.
      - name: Pack tarball (dry-run artifact)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm pack
      - name: Upload tarball artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: torana-tarball
          path: torana-*.tgz
          if-no-files-found: error

      # No NODE_AUTH_TOKEN here — npm uses OIDC via the id-token:write permission
      # above, authenticated against the Trusted Publisher configured on npmjs.com.
      # Skipped on workflow_dispatch when dry_run=true (default for manual runs).
      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.dist_tag }}
