name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Scan full history — a secret leaked in any commit is a secret.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: No lifecycle scripts
        run: |
          set -euo pipefail
          FORBIDDEN="preinstall postinstall install prepare"
          for script in $FORBIDDEN; do
            if jq -e ".scripts.\"$script\"" package.json > /dev/null 2>&1; then
              echo "::error::package.json declares forbidden script '$script'"
              exit 1
            fi
          done
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test --timeout 15000
      # Build + verify the tarball would ship the runtime-loaded SQL files.
      # Regression guard for the rc.1 incident where migrations shipped empty.
      - name: Build
        run: bun run build
      - name: Verify pack manifest
        run: bun run scripts/verify-pack.ts

  macos-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test --timeout 15000

  # Install the packed tarball inside a clean Docker container and exercise
  # the published CLI. Catches the general class of "green in-repo CI but
  # broken as installed" bugs that the pack-manifest check doesn't cover —
  # bin-path errors, ESM/CJS interop at install time, missing permission
  # bits, transitive imports that didn't bundle. See issue #4.
  docker-install-smoke:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Pack tarball
        run: npm pack
      - name: Install + exercise in container
        run: |
          set -euo pipefail
          TARBALL=$(ls torana-*.tgz | head -n1)
          echo "Using tarball: $TARBALL"
          # Install the tarball into a scratch directory and invoke the bin
          # directly. `bun install -g` against a local tarball path fails
          # inside the oven/bun image with "ENOENT extracting tarball" (the
          # global-install flow expects a registry URL). Local install into
          # a fresh node_modules exercises the same consumption path — if
          # the bin shim, shebang, or packed files are broken, this fails.
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            oven/bun:latest \
            bash -c '
              set -euo pipefail
              mkdir -p /tmp/smoke
              cd /tmp/smoke
              bun init -y > /dev/null
              bun install "/work/'"$TARBALL"'"
              ./node_modules/.bin/torana version
              ./node_modules/.bin/torana validate --config /work/.github/ci-fixtures/torana.yaml
              ./node_modules/.bin/torana migrate --dry-run --config /work/.github/ci-fixtures/torana.yaml
            '
